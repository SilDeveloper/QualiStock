<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QualiStock</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(-45deg, #102542, #212529, #247BA0, #80727B);
            background-size: 400% 400%;
            animation: gradient 12s ease infinite;
            font-family: 'Segoe UI', sans-serif;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            border-radius: 18px;
            border: none;
            backdrop-filter: blur(10px);
        }

        .footer {
            background: rgba(0,0,0,0.3);
            color: white;
        }
    </style>
</head>

<body class="d-flex flex-column">

    <div class="flex-grow-1 d-flex align-items-center justify-content-center">

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-4">

                    <div class="card p-4 shadow-lg bg-white">

                        <div class="text-center mb-3">
                            <img src="https://qualificamarica.com.br/wp-content/uploads/2024/10/icone-qualifica-marica.webp"
                                 style="height:70px;">
                        </div>

                        <h3 class="text-center fw-bold mb-4">QualiStock IA</h3>

                        <form id="form-login">

                            <div class="mb-3">
                                <label class="form-label fw-bold">Usuário</label>
                                <input type="text" name="usuario" class="form-control" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Senha</label>
                                <input type="password" name="senha" class="form-control" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 fw-bold">
                                Entrar
                            </button>

                            <div class="text-center mt-3">
                                <span class="small text-muted">Não possui conta?</span>
                                <a href="/cadastro" class="fw-bold text-decoration-none">
                                    Criar Conta
                                </a>
                            </div>

                        </form>

                    </div>

                </div>
            </div>
        </div>

    </div>

<footer class="footer py-3 mt-auto">
    <div class="container text-center small">
        <div>
            <strong class="text-white">QualiStock IA</strong>
            <span class="opacity-75"> • Sistema Inteligente de Estoque</span>
        </div>
        <div class="opacity-75">
            Versão 3.0.1 • Build 2026
        </div>
        <div class="opacity-50">
            © 2026 Qualifica Maricá • Equipe Erro 404
        </div>
    </div>
</footer>

    <script>
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();

            const res = await fetch('/login', {
                method: 'POST',
                body: new FormData(e.target)
            });

            const data = await res.json();

            if (res.ok) {
                window.location.href = '/dashboard';
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Acesso Negado',
                    text: data.mensagem || 'Usuário ou senha inválidos.'
                });
            }
        });
    </script>

</body>
</html>
